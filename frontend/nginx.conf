server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 10m;

    # Root path: detect social crawlers for dynamic OG tags
    location = / {
        error_page 418 = @root_og_proxy;
        if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|LinkedInBot|WhatsApp|TelegramBot|Slackbot|Discordbot|bingbot|Googlebot|ia_archiver|PinterestBot|Applebot|Embedly)") {
            return 418;
        }
        try_files $uri /index.html;
    }

    location @root_og_proxy {
        internal;
        set $backend_host quiztroyer_backend;
        proxy_pass http://$backend_host:4000/index-ssr.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Social crawlers get OG-tagged HTML; browsers get the SPA
    location = /concursos/el-gran-upgrade {
        error_page 418 = @contest_og_proxy;
        if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|LinkedInBot|WhatsApp|TelegramBot|Slackbot|Discordbot|bingbot|Googlebot|ia_archiver|PinterestBot|Applebot|Embedly)") {
            return 418;
        }
        try_files $uri /index.html;
    }

    location @contest_og_proxy {
        internal;
        set $backend_host quiztroyer_backend;
        proxy_pass http://$backend_host:4000/api/contest/og;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /uploads/ {
        set $backend_host quiztroyer_backend;
        proxy_pass http://$backend_host:4000$request_uri;
    }

    location /api/ {
        set $backend_host quiztroyer_backend;
        proxy_pass http://$backend_host:4000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        set $backend_host quiztroyer_backend;
        proxy_pass http://$backend_host:4000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
