version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quiztroyer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiztroyer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiztroyer_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quiztroyer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiztroyer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiztroyer_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quiztroyer}:${POSTGRES_PASSWORD:-quiztroyer_secret}@postgres:5432/${POSTGRES_DB:-quiztroyer}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:4000}
    container_name: quiztroyer_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
